<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Poomsae SaaS{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('public.home') }}">Poomsae SaaS</a>
    <div class="ms-auto">
      <a class="btn btn-outline-light btn-sm" href="{{ url_for('auth.login') }}">Login</a>
      <a class="btn btn-outline-light btn-sm" href="{{ url_for('auth.logout') }}">Logout</a>
      <a class="btn btn-outline-light btn-sm" href="{{ url_for('alumnos.index') }}">Alumnos</a>
      <a class="btn btn-outline-light btn-sm" href="{{ url_for('videos.index') }}">Videos</a>
    </div>
  </div>
</nav>

<div class="container py-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{category}}">{{message}}</div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

</body>
</html>
